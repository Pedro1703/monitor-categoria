# Deploy de JavIA en Render — PLAN GRATUITO, sin tarjeta.
#
# El plan free NO pide tarjeta. Su "pero": la app se duerme tras 15 min sin uso y
# tarda ~40 s en despertar cuando alguien entra. Para un equipo que la usa de a ratos
# es transparente. Si quisieras que nunca se duerma, ahí sí hace falta el plan pago.
services:
  - type: web
    name: javia
    runtime: docker
    plan: free
    healthCheckPath: /login
    envVars:
      - key: JAVIA_PASSWORD          # se carga a mano en el panel; nunca en el código
        sync: false
      - key: JAVIA_SECRET            # Render lo genera solo
        generateValue: true
      - key: APIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JAVIA_TOPE_CORRIDA
        value: "25"
      - key: JAVIA_TOPE_MES
        value: "100"
# Nota: el plan free no tiene disco persistente. Los datos scrapeados y la bitácora
# de gasto viven en memoria y se reinician cuando la app se duerme. Consecuencia:
# el tope POR CORRIDA (25 USD) sigue firme siempre; el tope MENSUAL se reinicia con
# cada arranque. Para un equipo chico alcanza — si no, se pasa a un plan con disco.
