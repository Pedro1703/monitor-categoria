# Deploy del Monitor en Render — PLAN PAGO (Standard), robusto.
#
# Por qué Standard y no free:
#   · RAM: el motor de NLP local (RoBERTuito / pysentimiento) necesita ~2 GB. En el free
#     (512 MB) no entra; en Standard sí, y ahí el "tercer voto" de validación corre gratis.
#   · No se duerme: la app queda siempre despierta (el free se dormía a los 15 min).
#   · Disco persistente: los datos scrapeados, la bitácora de gasto y el log de consultas
#     sobreviven a los redeploys y reinicios (en el free vivían en memoria y se perdían).
#     Con esto el TOPE MENSUAL de gasto ya no se reinicia con cada arranque: es real.
services:
  - type: web
    name: monitor-categoria
    runtime: docker
    plan: standard          # 2 GB RAM · no se duerme · admite disco
    healthCheckPath: /login
    disk:
      name: datos
      mountPath: /app/raw   # TODO lo durable vive acá y persiste: raw/, costos.json,
      sizeGB: 5             # bitacora.json, consultas.json y el cache del modelo (raw/hf).
    envVars:
      - key: JAVIA_PASSWORD          # se carga a mano en el panel; nunca en el código
        sync: false
      - key: JAVIA_SECRET            # Render lo genera solo
        generateValue: true
      - key: APIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JAVIA_TOPE_CORRIDA
        value: "25"
      - key: JAVIA_TOPE_MES
        value: "100"
