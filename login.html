<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JavIA · Ciudadana</title>
<style>
  :root{ --lav:#C4B5E8; --line:#26262B; --ink-3:#6E6E78; --bad:#FF7A6B; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:#000;color:#fff;display:flex;
       align-items:center;justify-content:center;padding:24px;
       font-family:"Helvetica Neue",-apple-system,BlinkMacSystemFont,sans-serif}
  .box{width:100%;max-width:380px}
  img{height:18px;width:auto;margin-bottom:44px;display:block}
  h1{font-size:44px;font-weight:800;margin:0 0 6px;letter-spacing:-.015em}
  h1 .ia{color:var(--lav)}
  p.lead{font-family:Georgia,serif;font-style:italic;color:var(--lav);
         font-size:16px;margin:0 0 40px}
  label{display:block;font-size:11px;letter-spacing:.09em;text-transform:uppercase;
        color:var(--ink-3);font-weight:700;margin:0 0 8px}
  input{width:100%;background:#161619;border:1px solid var(--line);border-radius:10px;
        color:#fff;padding:14px 15px;font-size:15px;font-family:inherit;margin-bottom:16px}
  input:focus{outline:none;border-color:var(--lav)}
  button{width:100%;background:var(--lav);color:#000;border:0;border-radius:10px;
         padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.4;cursor:wait}
  .err{color:var(--bad);font-size:13px;margin-top:14px;min-height:18px}
  .pie{color:var(--ink-3);font-size:12px;margin-top:36px;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <img src="/logo.png" alt="Ciudadana">
  <h1>Jav<span class="ia">IA</span></h1>
  <p class="lead">Qué dicen las marcas, qué contesta la gente, y dónde no hay nadie.</p>

  <form onsubmit="entrar(event)">
    <label>Tu nombre</label>
    <input type="text" id="quien" placeholder="Para saber quién corre cada análisis" autocomplete="name" required>
    <label>Contraseña</label>
    <input type="password" id="pass" autocomplete="current-password" required autofocus>
    <button id="btn" type="submit">Entrar</button>
    <div class="err" id="err"></div>
  </form>

  <div class="pie">
    Herramienta interna de Ciudadana. Cada corrida consume créditos de API reales
    y queda registrada con tu nombre.
  </div>
</div>

<script>
async function entrar(e){
  e.preventDefault();
  const btn = document.getElementById("btn"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  const r = await fetch("/api/login", {
    method: "POST",
    body: JSON.stringify({
      password: document.getElementById("pass").value,
      quien: document.getElementById("quien").value,
    }),
  });
  if (r.ok) { location.href = "/"; return; }
  const d = await r.json().catch(() => ({}));
  err.textContent = d.error || "No se pudo entrar.";
  btn.disabled = false;
  document.getElementById("pass").value = "";
  document.getElementById("pass").focus();
}
</script>
</body>
</html>
